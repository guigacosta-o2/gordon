document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" role=\"img\" aria-label=\"Gordon\">\n          <text x=\"16\" y=\"46\" font-family=\"Inter,'Helvetica Neue',Arial,sans-serif\" font-size=\"36\" font-weight=\"700\" letter-spacing=\"5.5\" fill=\"#2C2C2A\">GORDON<\u002Ftext>\n          <line x1=\"16\" y1=\"55\" x2=\"88\" y2=\"55\" stroke=\"#1B4332\" stroke-width=\"3\" stroke-linecap=\"square\"><\u002Fline>\n          <line x1=\"90\" y1=\"55\" x2=\"130\" y2=\"55\" stroke=\"#1B4332\" stroke-width=\"3\" stroke-dasharray=\"4 4\" stroke-linecap=\"square\"><\u002Fline>\n          <text x=\"16\" y=\"74\" font-family=\"Inter,'Helvetica Neue',Arial,sans-serif\" font-size=\"13\" font-weight=\"400\" letter-spacing=\"0.3\" fill=\"#888780\">Wall Street<\u002Ftext>\n          <text x=\"99\" y=\"74\" font-family=\"Inter,'Helvetica Neue',Arial,sans-serif\" font-size=\"13\" font-weight=\"500\" font-style=\"italic\" letter-spacing=\"0.2\" fill=\"#1B4332\">en tus manos<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fbutton>\n      <nav style=\"display:flex;align-items:center;gap:34px\">\n        <button onclick=\"{{ goHome }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:500;color:{{ inicioColor }};padding:6px 0\">Inicio<\u002Fbutton>\n        <button onclick=\"{{ goEditions }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:500;color:{{ edicionesColor }};padding:6px 0\">Ediciones<\u002Fbutton>\n        <button onclick=\"{{ goSobre }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:500;color:#5C6259;padding:6px 0\">Sobre Gordon<\u002Fbutton>\n        <button onclick=\"{{ goSubscribe }}\" style=\"background:#1B4332;color:#F1ECDF;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;padding:11px 22px;border-radius:999px;letter-spacing:.01em\">Suscribirse<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HOME ===== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n\n    <!-- HERO -->\n    <section style=\"background:#1B4332;color:#F1ECDF;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(120% 80% at 85% 0%, rgba(181,144,78,.16), transparent 60%);pointer-events:none\"><\u002Fdiv>\n      <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px 104px;position:relative\">\n        <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:72px;align-items:center\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:#B5904E;margin-bottom:26px\">Carta semanal · Cada jueves<\u002Fdiv>\n            <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:62px;line-height:1.04;letter-spacing:-.02em;margin-bottom:24px\">El mercado americano, explicado para ti.<\u002Fh1>\n            <p style=\"font-size:19px;line-height:1.6;color:rgba(241,236,223,.82);max-width:30em\">Wall Street en cinco minutos. Cada jueves, un análisis claro del mercado estadounidense, escrito para quien invierte desde Latinoamérica.<\u002Fp>\n            <div style=\"margin-top:36px;display:flex;align-items:center;gap:16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.04em;color:rgba(241,236,223,.6)\">\n              <span>+12.400 lectores<\u002Fspan><span style=\"opacity:.4\">/<\u002Fspan><span>Edición N.º 24<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Subscribe card -->\n          <div style=\"background:#F1ECDF;color:#1A211C;border-radius:14px;padding:34px 32px;box-shadow:0 24px 60px -28px rgba(0,0,0,.5)\">\n            <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:18px 0;text-align:center\">\n                <div style=\"width:46px;height:46px;border-radius:999px;background:#1B4332;color:#F1ECDF;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px\">✓<\u002Fdiv>\n                <div style=\"font-family:'Spectral',serif;font-size:23px;font-weight:600;margin-bottom:8px\">Estás dentro.<\u002Fdiv>\n                <p style=\"font-size:15px;color:#5C6259;line-height:1.5\">Revisá tu correo para confirmar la suscripción. El domingo llega la primera.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-bottom:4px\">Recibí Gordon gratis<\u002Fdiv>\n              <p style=\"font-size:14.5px;color:#5C6259;margin-bottom:22px\">Un correo. Cada jueves. Cero ruido.<\u002Fp>\n              <form onsubmit=\"{{ submit }}\">\n                <input value=\"{{ email }}\" oninput=\"{{ setEmail }}\" type=\"email\" placeholder=\"tu@email.com\" style=\"width:100%;background:#FBF8F0;border:1px solid rgba(26,33,28,.16);border-radius:9px;padding:13px 15px;font-family:'Hanken Grotesk',sans-serif;font-size:15px;color:#1A211C;margin-bottom:16px;outline:none\">\n                <button type=\"submit\" style=\"width:100%;background:#1B4332;color:#F1ECDF;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;font-weight:600;padding:14px;border-radius:9px\">Quiero recibir Gordon →<\u002Fbutton>\n              <\u002Fform>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.03em;color:#8A8E83;text-align:center;margin-top:14px\">Gratis · Sin spam · Cancelá cuando quieras<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- VALUE -->\n    <section style=\"max-width:1180px;margin:0 auto;padding:90px 32px 70px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:#B5904E;margin-bottom:14px\">Por qué Gordon<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-size:38px;font-weight:600;letter-spacing:-.015em;max-width:16em;line-height:1.12;margin-bottom:54px\">La información es el activo más valioso. Te la damos sin jerga ni humo.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:40px;border-top:1px solid rgba(26,33,28,.14);padding-top:44px\">\n        <sc-for list=\"{{ valueProps }}\" as=\"vp\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"font-family:'Spectral',serif;font-size:30px;font-weight:600;color:#1B4332;margin-bottom:14px\">{{ vp.k }}<\u002Fdiv>\n            <div style=\"font-size:18px;font-weight:600;margin-bottom:8px\">{{ vp.t }}<\u002Fdiv>\n            <p style=\"font-size:15.5px;color:#5C6259;line-height:1.55\">{{ vp.d }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FEATURED EDITION -->\n    <section style=\"max-width:1180px;margin:0 auto;padding:50px 32px 80px\">\n      <div style=\"background:#FBF8F0;border:1px solid rgba(26,33,28,.1);border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr\">\n        <div style=\"padding:52px 48px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#B5904E;margin-bottom:20px\">Última edición · 28 jun 2026<\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-size:34px;font-weight:700;line-height:1.1;letter-spacing:-.015em;margin-bottom:18px\">La Fed parpadeó: qué significa el giro de Powell para tu cartera<\u002Fh3>\n          <p style=\"font-size:16.5px;color:#5C6259;line-height:1.6;margin-bottom:30px\">Powell abrió la puerta a un recorte de tasas antes de lo previsto. Te explico, sin tecnicismos, qué cambia para tus inversiones y qué es solo ruido de mercado.<\u002Fp>\n          <button onclick=\"{{ goEditions }}\" style=\"background:none;border:1px solid #1B4332;color:#1B4332;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:600;padding:12px 24px;border-radius:999px\">Leer la edición →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#1B4332;color:#F1ECDF;padding:52px 48px;display:flex;flex-direction:column;justify-content:center;gap:26px\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:24px;line-height:1.4;color:rgba(241,236,223,.92)\">\"El mercado no se mueve por las noticias, sino por lo que las noticias cambian en las expectativas.\"<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#B5904E\">— Del análisis de esta semana<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ABOUT -->\n    <section id=\"sobre\" style=\"background:#16382B;color:#F1ECDF\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:88px 32px;display:grid;grid-template-columns:.8fr 1.2fr;gap:64px;align-items:start\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:#B5904E\">Sobre Gordon<\u002Fdiv>\n        <div>\n          <p style=\"font-family:'Spectral',serif;font-size:29px;line-height:1.4;font-weight:500;letter-spacing:-.01em;margin-bottom:26px\">El mercado estadounidense define gran parte de lo que pasa con tu dinero en Latinoamérica. Pero casi nadie lo explica pensando en vos.<\u002Fp>\n          <p style=\"font-size:17px;line-height:1.65;color:rgba(241,236,223,.78);max-width:42em\">Gordon nace de esa brecha. Cada domingo traducimos lo que de verdad importó en Wall Street a un análisis breve, honesto y accionable. Sin alarmismo, sin promesas de hacerte rico, sin tecnicismos que esconden que nadie entendió la noticia. Solo claridad par s.' },\n      { n: '17', date: '10 may 2026', tag: 'Macro', read: '4 min', title: 'Inflación de servicios: el dato que la Fed no suelta', summary: 'El componente más terco del IPC y por qué define el calendario de tasas.' },\n    ];\n\n    return {\n      isHome: this.state.page === 'home',\n      isEditions: this.state.page === 'ediciones',\n      inicioColor: this.state.page === 'home' ? '#1B4332' : '#5C6259',\n      edicionesColor: this.state.page === 'ediciones' ? '#1B4332' : '#5C6259',\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      email: this.state.email,\n      valueProps,\n      editions,\n      goHome: () => this.go('home'),\n      goEditions: () => this.go('ediciones'),\n      goSobre: () => { this.go('home'); },\n      goSubscribe: () => {\n        this.go('home');\n        if (typeof document !== 'undefined') {\n          setTimeout(() => { const el = document.querySelector('input[type=email]'); if (el) el.focus(); }, 60);\n        }\n      },\n      setEmail: (e) => this.setState({ email: e.target.value }),\n      submit: (e) => { e.preventDefault(); this.setState({ subscribed: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
